services:
  db:
    image: postgres:16
    container_name: socrat-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-socrat}
    ports:
      - "5432:5432"
    volumes:
      - socrat-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  socrat-db-data:
